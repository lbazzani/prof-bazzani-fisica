    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

<body>
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="btn-home" aria-label="Torna alla home">
                <span class="btn-home-arrow">&larr;</span>
                <span class="btn-home-label">Home</span>
            </a>
            <div class="logo">
                <span class="logo-icon">🤓</span>
                <h1>Il Prof Bazzani</h1>
                <span class="logo-subtitle">Teoria</span>
            </div>
            <button class="btn-glossario" id="btn-glossario" aria-label="Apri glossario">
                <span class="btn-glossario-icon">📖</span>
                <span class="btn-glossario-label">Glossario</span>
            </button>
        </div>
    </header>


    <!-- Tab temi (populated dynamically by teoria-app.js) -->
    <nav class="problem-tabs" id="topic-tabs"></nav>

    <!-- Dropdown mobile (populated dynamically by teoria-app.js) -->
    <div class="tab-dropdown">
        <select id="tab-select"></select>
    </div>

    <main class="main-content">
        <div class="content-grid">
            <div class="canvas-container">
                <canvas id="animation-canvas" width="600" height="400"></canvas>
                <div id="interactive-controls" class="interactive-controls"></div>
            </div>
            <div class="explanation-container">
                <div class="step-badge">
                    <span id="step-number">1</span> / <span id="step-total">6</span>
                </div>
                <h2 id="step-title" class="step-title">Caricamento...</h2>
                <div id="step-text" class="step-text"></div>
                <div id="step-formula" class="step-formula"></div>
            </div>
        </div>

        <div id="quiz-panel" class="quiz-panel" style="display:none">
            <div class="quiz-header">
                <h2>🎯 Mettiti alla prova!</h2>
                <p class="quiz-subtitle">Vediamo se hai capito i concetti chiave</p>
            </div>
            <div id="quiz-questions" class="quiz-questions"></div>
            <div id="quiz-result" class="quiz-result"></div>
            <button id="quiz-back" class="nav-btn">← Torna alla lezione</button>
        </div>

        <div class="step-navigation">
            <button id="btn-prev" class="nav-btn" disabled>
                <span class="nav-arrow">←</span> Indietro
            </button>
            <div id="step-dots" class="step-dots"></div>
            <button id="btn-next" class="nav-btn nav-btn-primary">
                Avanti <span class="nav-arrow">→</span>
            </button>
        </div>
    </main>

    <footer class="footer">
        <p>Dedicato alla mitica 1G del Convitto</p>
        <p class="footer-contact">
            Domande o suggerimenti? <a href="mailto:lorenzo@bazzani.info">lorenzo@bazzani.info</a>
        </p>
    </footer>

    <!-- TopicRegistry must be defined before tema files load -->
    <script>
    const TopicRegistry = {
        _topics: [],
        register(topic) { this._topics.push(topic); },
        getAll() { return this._topics.sort((a, b) => (a.order || 0) - (b.order || 0)); }
    };
    window.TopicRegistry = TopicRegistry;
    </script>

    <script>
    const APP_VERSION = Date.now();
    function loadScript(src) {
        const s = document.createElement('script');
        s.src = src + '?v=' + APP_VERSION;
        document.body.appendChild(s);
        return new Promise(r => s.onload = r);
    }
    document.getElementById('app-css').href = 'style.css?v=' + APP_VERSION;
    loadScript('draw.js')
        .then(() => loadScript('progress.js'))
        .then(() => loadScript('glossario.js'))
        .then(() => loadScript('teoria/tema1.js'))
        .then(() => loadScript('teoria/tema2.js'))
        .then(() => loadScript('teoria/tema3.js'))
        .then(() => loadScript('teoria/tema4.js'))
        .then(() => loadScript('teoria/tema5.js'))
        .then(() => loadScript('teoria/tema6.js'))
        .then(() => loadScript('teoria/tema7.js'))
        .then(() => loadScript('teoria/tema8.js'))
        .then(() => loadScript('teoria/tema9.js'))
        .then(() => loadScript('teoria/teoria-app.js'));
    </script>
